# force copy from tencent/tdesign
# 当在 issue 的 comment 回复类似 `Duplicate of #111` 这样的话，issue 将被自动打上 重复提交标签 并且 cloese
name: Issue Mark Duplicate

on:
  issue_comment:
    types: [created, edited]

jobs:
  mark-duplicate:
    runs-on: ubuntu-latest
    steps:
      - name: mark-duplicate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = context.payload.comment.body || '';
            const match = body.match(/[Dd]uplicate\s+of\s+#(\d+)/);
            if (!match) return;

            // Only allow collaborators to mark duplicates
            const authorAssociation = context.payload.comment.author_association;
            const allowedRoles = ['COLLABORATOR', 'MEMBER', 'OWNER'];
            if (!allowedRoles.includes(authorAssociation)) {
              core.info(`Skipping: commenter role "${authorAssociation}" is not allowed to mark duplicates.`);
              return;
            }

            // Add 'duplicate' label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['duplicate']
            });
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
