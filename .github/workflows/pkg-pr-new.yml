name: pkg-pr-new
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    if: ${{ github.repository == 'Tencent/tdesign-miniprogram' && !startsWith(github.head_ref, 'release/') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - run: pnpm install

      - run: pnpm exec run-p  build 'uniapp build:npm'

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: pnpm dlx pkg-pr-new publish 'packages/tdesign-miniprogram' 'packages/tdesign-uniapp' 'packages/tdesign-uniapp-chat'

      - name: 通知下游仓库更新依赖
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repos = [
              { owner: 'TDesignOteam', repo: 'tdesign-uniapp-starter' },
              { owner: 'TDesignOteam', repo: 'tdesign-uniapp-starter-vue2-cli' },
            ];

            for (const { owner, repo } of repos) {
              try {
                await github.rest.repos.createDispatchEvent({
                  owner,
                  repo,
                  event_type: 'tdesign-miniprogram-pr',
                  client_payload: {
                    pr_number: String(prNumber),
                    pr_title: context.payload.pull_request.title,
                    pr_url: context.payload.pull_request.html_url,
                  },
                });
                core.info(`✅ 已通知 ${owner}/${repo}，PR #${prNumber}`);
              } catch (error) {
                core.warning(`⚠️ 通知 ${owner}/${repo} 失败: ${error.message}`);
              }
            }
